name: Validate Schema

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade uv
          uv pip install --system mlcroissant

      - name: Validate schema for the example adapter collectri
        run: |
          cd external_repos/adapter_collectri
          mlcroissant validate --jsonld collectri.json

