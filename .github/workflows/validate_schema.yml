name: Validate Schema

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.13']

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Validate schema for the example adapter collectri
        uses: ssciwr/validate-croissant-schema@v0
        with:
          file: "external_repos/adapter_collectri/collectri.json"
          python-version: ${{ matrix.python-version }}

