services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: biocypher-registry-backend
    environment:
      BIOCYPHER_REGISTRY_DB_PATH: /app/data/registry.sqlite3
    ports:
      - "8000:8000"
    volumes:
      - ./.docker-data/backend:/app/data
    command:
      - uv
      - run
      - --no-sync
      - uvicorn
      - src.api.app:app
      - --host
      - 0.0.0.0
      - --port
      - "8000"
